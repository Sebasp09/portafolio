<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio | Sebastian Perez</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HERO -->
    <section class="hero">
        <img src="https://images.unsplash.com/photo-1522075469751-3a6694fb2f61?auto=format&fit=crop&w=300&q=80" alt="Foto de perfil">
        <h1>Sebastian Perez</h1>
        <h2>Desarrollador Web</h2>
        <a class="btn" href="#proyectos">Ver proyectos</a>
    </section>

    <!-- SKILLS -->
    <section class="skills">
        <h2>Skills</h2>

        <div class="skills-container">

            <div class="skill-card">
                <div class="skill-header">
                    <span class="skill-name">HTML</span>
                    <span class="skill-percent">80%</span>
                </div>
                <div class="bar"><div class="progress html"></div></div>
            </div>

            <div class="skill-card">
                <div class="skill-header">
                    <span class="skill-name">CSS</span>
                    <span class="skill-percent">60%</span>
                </div>
                <div class="bar"><div class="progress css"></div></div>
            </div>

            <div class="skill-card">
                <div class="skill-header">
                    <span class="skill-name">JavaScript</span>
                    <span class="skill-percent">40%</span>
                </div>
                <div class="bar"><div class="progress js"></div></div>
            </div>

            <div class="skill-card">
                <div class="skill-header">
                    <span class="skill-name">Python</span>
                    <span class="skill-percent">60%</span>
                </div>
                <div class="bar"><div class="progress python"></div></div>
            </div>

            <div class="skill-card">
                <div class="skill-header">
                    <span class="skill-name">Java</span>
                    <span class="skill-percent">90%</span>
                </div>
                <div class="bar"><div class="progress java"></div></div>
            </div>

            <div class="skill-card">
                <div class="skill-header">
                    <span class="skill-name">Git</span>
                    <span class="skill-percent">70%</span>
                </div>
                <div class="bar"><div class="progress git"></div></div>
            </div>

        </div>
    </section>

    <!-- PROYECTOS -->
    <section id="proyectos" class="projects">
        <h2>Proyectos</h2>

        <div class="projects-container">

            <div class="project-card">
                <img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&w=800&q=80" alt="Proyecto 1">
                <h3>Proyecto 1</h3>
                <p>Dashboard de gestión de tareas.</p>
                <a href="#" class="btn-small">Ver más</a>
            </div>

            <div class="project-card">
                <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&w=800&q=80" alt="Proyecto 2">
                <h3>Proyecto 2</h3>
                <p>Aplicación web de análisis de datos.</p>
                <a href="#" class="btn-small">Ver más</a>
            </div>

            <div class="project-card">
                <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=800&q=80" alt="Proyecto 3">
                <h3>Proyecto 3</h3>
                <p>API REST con Node.js.</p>
                <a href="#" class="btn-small">Ver más</a>
            </div>

        </div>
    </section>

    <!-- CONTACTO -->
    <section class="contact">
        <h2>Contacto</h2>

        <form>
            <input type="text" placeholder="Nombre" required>
            <input type="email" placeholder="Email" required>
            <textarea placeholder="Mensaje" required></textarea>
            <button type="submit" class="btn">Enviar</button>
        </form>
    </section>

</body>

</html>
