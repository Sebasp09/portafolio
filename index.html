<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sebastian Perez | Portafolio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section class="hero">
        <img src="https://picsum.photos/150" alt="Foto de perfil Sebastian Perez">
        <h1>Sebastian Perez</h1>
        <h2>Desarrollador web</h2>
        <a class="btn" href="#proyectos">Ver proyectos</a>
    </section>

    <section id="skills" class="skills">

        <h2>Skills</h2>

        <div class="skills-container">

            <div class="skill-card">

                <div class="skill-header">
                    <span class="skill-name">HTML</span>
                    <span class="skill-percent">80%</span>
                </div>

                <div class="bar">
                    <div class="progress html"></div>
                </div>

            </div>

            <div class="skill-card">

                <div class="skill-header">
                    <span class="skill-name">CSS</span>
                    <span class="skill-percent">60%</span>
                </div>

                <div class="bar">
                    <div class="progress css"></div>
                </div>

            </div>

            <div class="skill-card">

                <div class="skill-header">
                    <span class="skill-name">JavaScript</span>
                    <span class="skill-percent">40%</span>
                </div>

                <div class="bar">
                    <div class="progress js"></div>
                </div>

            </div>

            <div class="skill-card">

                <div class="skill-header">
                    <span class="skill-name">Python</span>
                    <span class="skill-percent">60%</span>
                </div>

                <div class="bar">
                    <div class="progress python"></div>
                </div>

            </div>

            <div class="skill-card">

                <div class="skill-header">
                    <span class="skill-name">Java</span>
                    <span class="skill-percent">90%</span>
                </div>

                <div class="bar">
                    <div class="progress java"></div>
                </div>

            </div>

            <div class="skill-card">

                <div class="skill-header">
                    <span class="skill-name">Git</span>
                    <span class="skill-percent">70%</span>
                </div>

                <div class="bar">
                    <div class="progress git"></div>
                </div>

            </div>

        </div>

    </section>

</body>

</html>
